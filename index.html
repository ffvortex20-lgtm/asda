<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VORTEX PROXY V1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card" id="login">
        <h2>VORTEX PROXY V1</h2>
        <input type="text" id="user" placeholder="USUARIO">
        <input type="password" id="pass" placeholder="SENHA">
        <button onclick="logar()">LOGAR</button>
    </div>

    <div class="card" id="panel" style="display:none;">
        <button onclick="disparar('HS_PESCOCO')">HS PESCOÇO</button>
        <button onclick="disparar('HS_QUADRIL')">HS QUADRIL</button>
        <p id="status">Status: Aguardando Pareamento...</p>
    </div>

    <script>
        function logar() {
            if(document.getElementById("user").value === "VORTEX" && document.getElementById("pass").value === "PROXY") {
                document.getElementById("login").style.display = 'none';
                document.getElementById("panel").style.display = 'block';
            } else { alert("Acesso Negado!"); }
        }
        function disparar(func) {
            // A "Ponte" que fala com o seu App no Sketchware
            AndroidBridge.iniciarInjecao(func);
        }
    </script>
</body>
</html>
