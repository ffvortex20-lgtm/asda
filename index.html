<!DOCTYPE html>
<html>
<body>
    <button onclick="AndroidBridge.iniciarVortex()">CONECTAR PROXY</button>
    
    <script>
        // Esta função envia o comando para o seu App Android
        function iniciarVortex() {
            if (typeof AndroidBridge !== "undefined") {
                AndroidBridge.iniciarVortex();
            } else {
                alert("Erro: O App não está conectado ao sistema.");
            }
        }
    </script>
</body>
</html>
